  :root{--terra:#c8a882;--deep:#2c2416;--olive:#7a8c6e;--stone:#9b9082;--light:#faf8f4;--sand:#f5f0e8;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Jost',sans-serif;background:var(--light);color:var(--deep);min-height:100vh;}
  header{background:var(--deep);padding:22px 48px;display:flex;align-items:center;gap:16px;}
  .logo{width:34px;height:34px;border:1.5px solid var(--terra);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;color:var(--terra);font-size:17px;font-style:italic;}
  header h1{font-family:'Cormorant Garamond',serif;color:#fff;font-size:21px;font-weight:300;letter-spacing:.08em;}
  header .sub{color:var(--stone);font-size:10px;letter-spacing:.2em;text-transform:uppercase;margin-top:2px;}
  .main{max-width:960px;margin:0 auto;padding:40px 32px;}
  .card{background:#fff;border:1px solid #e8e2d9;padding:32px;margin-bottom:20px;}
  .lbl{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--stone);margin-bottom:12px;}
  .prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px;}
  .prop-card{border:1.5px solid #e0d9cf;padding:0;cursor:pointer;transition:all .2s;background:var(--light);overflow:hidden;}
  .prop-card:hover{border-color:var(--terra);}
  .prop-card.active{border-color:var(--terra);box-shadow:0 0 0 2px rgba(200,168,130,.25);}
  .pc-thumb{width:100%;height:100px;object-fit:cover;display:block;background:var(--sand);}
  .pc-info{padding:10px 12px;}
  .pc-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:400;}
  .pc-loc{font-size:10px;color:var(--stone);letter-spacing:.05em;margin-top:2px;}
  .url-note{font-size:12px;color:var(--stone);margin-top:12px;padding:11px 13px;background:var(--light);border:1px solid #e8e2d9;line-height:1.6;}
  .opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-top:18px;}
  .opt label{display:block;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--stone);margin-bottom:6px;}
  .opt select,.opt input[type=text]{width:100%;padding:9px 11px;border:1.5px solid #e0d9cf;font-family:'Jost',sans-serif;font-size:13px;color:var(--deep);background:var(--light);outline:none;}
  .tog-row{display:flex;align-items:center;gap:8px;margin-top:5px;font-size:12.5px;}
  .tog{position:relative;width:36px;height:19px;cursor:pointer;flex-shrink:0;}
  .tog input{opacity:0;width:0;height:0;}
  .sl{position:absolute;inset:0;background:#d5cfc6;transition:.25s;border-radius:2px;}
  .sl:before{content:'';position:absolute;width:13px;height:13px;left:3px;top:3px;background:white;transition:.25s;}
  input:checked+.sl{background:var(--terra);}
  input:checked+.sl:before{transform:translateX(17px);}
  .btn{padding:12px 26px;border:none;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .btn-d{background:var(--deep);color:#fff;} .btn-d:hover{background:#3d3525;} .btn-d:disabled{background:#aaa;cursor:not-allowed;}
  .btn-t{background:var(--terra);color:#fff;} .btn-t:hover{background:#b8946e;} .btn-t:disabled{background:#ccc;cursor:not-allowed;}

  .pv-card{display:none} .pv-card.on{display:block}
  .pv-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid #e8e2d9;}
  .pv-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;}
  .pv-loc{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--stone);margin-top:4px;}
  .mosaic{display:grid;gap:3px;margin-bottom:3px;grid-template-columns:2fr 1fr 1fr;grid-template-rows:195px 195px;}
  .mi{overflow:hidden;background:var(--sand);}
  .mi:first-child{grid-row:1/3;}
  .mi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
  .mi img:hover{transform:scale(1.04);}
  .strip{display:flex;gap:3px;margin-bottom:22px;overflow-x:auto;}
  .si{flex-shrink:0;width:115px;height:75px;overflow:hidden;background:var(--sand);}
  .si img{width:100%;height:100%;object-fit:cover;display:block;}

  .spec{flex:1;text-align:center;border-right:1px solid #e8e2d9;} .spec:last-child{border-right:none;}
  .sv{font-family:'Cormorant Garamond',serif;font-size:21px;}

  .desc-text{font-size:13.5px;line-height:1.85;color:#4a4030;}
  .sec-hd{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--stone);margin:20px 0 9px;}
  .tags{display:flex;flex-wrap:wrap;gap:5px;}

  .hint{font-size:11px;color:var(--stone);margin-top:16px;padding-top:13px;border-top:1px solid #f0ebe3;}

  .prog-bar{height:3px;background:#e8e2d9;border-radius:2px;overflow:hidden;margin-bottom:5px;}
  .prog-fill{height:100%;background:var(--terra);width:0%;transition:width .25s;border-radius:2px;}
  .prog-lbl{font-size:10px;color:var(--stone);text-align:right;}
  .msg{padding:12px 16px;font-size:13px;margin-bottom:16px;display:none;border:1px solid;line-height:1.5;}
  .msg.on{display:block;}
  .msg.warn{background:#fef9f0;border-color:#e8d8a0;color:#7a6020;}
  .msg.info{background:#f0f6ff;border-color:#b8d0f0;color:#2a4a80;}
</style>
</head>
<body>
<header>
  <div class="logo">F</div>
  <div><h1>Finca Exposé Generator</h1><div class="sub">Unbranded PDF · The Balearian</div></div>
</header>
<div class="main">
  <div class="card">
    <div class="lbl">Objekt auswählen</div>
    <div class="prop-grid" id="propGrid"></div>
    <div class="url-note">
      ➕ <strong>Weitere Objekte:</strong> Einfach die Booking-URL in den Chat schicken — Claude fügt sie automatisch ins Tool ein.
    </div>
    <div class="opts">
      <div class="opt"><label>Sprache</label>
        <select id="langSel" onchange="renderPv()">
          <option value="de">Deutsch</option>
          <option value="en">English</option>
          <option value="fr">Français</option>
        </select>
      </div>
      <div class="opt"><label>Fotos im PDF</label>
        <select id="photoCnt">
          <option value="6">6 Fotos</option>
          <option value="12" selected>12 Fotos</option>
          <option value="20">20 Fotos</option>
          <option value="99">Alle Fotos</option>
        </select>
      </div>
      <div class="opt"><label>Hinweistext (optional)</label>
        <input type="text" id="noteIn" placeholder="z.B. Verfügbar ab Mai 2025"/>
      </div>
      <div class="opt"><label>Optionen</label>
        <div class="tog-row">
          <label class="tog"><input type="checkbox" id="showDist" checked onchange="renderPv()"><span class="sl"></span></label>
          Entfernungen anzeigen
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-t" id="dlBtn" onclick="buildPDF()">↓ &nbsp;PDF herunterladen</button>
    </div>
  </div>

  <div class="msg warn" id="warnBox"></div>
  <div class="msg info" id="infoBox"></div>

  <div class="card pv-card" id="pvCard">
    <div class="pv-hd">
      <div><div class="pv-name" id="pvName">—</div><div class="pv-loc" id="pvLoc">—</div></div>
      <div class="dl-area">
        <div class="prog-wrap" id="progWrap">
          <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
          <div class="prog-lbl" id="progLbl"></div>
        </div>
      </div>
    </div>
    <div class="mosaic" id="pvMosaic"></div>
    <div class="strip" id="pvStrip"></div>
    <div class="specs-bar" id="pvSpecs"></div>
    <div class="desc-text" id="pvDesc"></div>
    <div class="sec-hd" id="hdAmen">Ausstattung</div><div class="tags" id="pvTags"></div>
    <div id="pvDistWrap"><div class="sec-hd" id="hdDist">Entfernungen</div><div class="dists" id="pvDist"></div></div>
    <div class="hint" id="pvHint"></div>
  </div>
</div>

// ── State ─────────────────────────────────────────────────────────
let selectedId = PROPERTIES[0].id;
let DATA = PROPERTIES[0];

// Get language-specific texts, fall back to 'de'
function T(prop, lang){ return prop.texts[lang] || prop.texts['de']; }
function getLang(){ return document.getElementById('langSel').value; }

// ── Image URL helpers ─────────────────────────────────────────────
function iUrl(id){ return `https://dyn.v-office.com/image/xl/${id}.webp`; }
function iUrlProxy(id){ return `https://wsrv.nl/?url=dyn.v-office.com/image/xl/${id}.webp&w=1200&output=jpg&q=85`; }

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  buildGrid();
  renderPv();
  document.getElementById('pvCard').classList.add('on');
});

function buildGrid(){
  const lang = getLang();
  const grid = document.getElementById('propGrid');
  grid.innerHTML = '';
  PROPERTIES.forEach(p => {
    const t = T(p, lang);
    const card = document.createElement('div');
    card.className = 'prop-card' + (p.id === selectedId ? ' active' : '');
    card.onclick = () => { selectedId = p.id; DATA = p; buildGrid(); renderPv(); };
    card.innerHTML = `
      <img class="pc-thumb" src="${iUrl(p.imageIds[0])}" onerror="this.style.display='none'">
      <div class="pc-info">
        <div class="pc-name">${p.name}</div>
        <div class="pc-loc">${t.location}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function renderPv(){
  const d = DATA;
  const lang = getLang();
  const t = T(d, lang);

  document.getElementById('pvName').textContent = d.name;
  document.getElementById('pvLoc').textContent  = t.location;

  document.getElementById('hdAmen').textContent = lang==='en'?'Amenities':lang==='fr'?'Équipements':'Ausstattung';

  const mosaic = document.getElementById('pvMosaic');

  d.imageIds.slice(0,5).forEach(id => {
    const div = document.createElement('div'); div.className='mi';
    const img = document.createElement('img');
    img.src = iUrl(id); img.alt = d.name; img.loading='lazy';
    img.onerror = () => { div.style.background='#ddd'; };
    div.appendChild(img); mosaic.appendChild(div);
  });

  // Strip
  const strip = document.getElementById('pvStrip');

  d.imageIds.slice(5).forEach(id => {

  // Specs

  };
  document.getElementById('pvHint').textContent = hintLabels[lang] || hintLabels.de;
}

// ── Image loading for PDF via wsrv.nl proxy ───────────────────────
function loadViaProxy(id) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const timer = setTimeout(() => resolve(null), 12000);
    img.onload = () => {
      clearTimeout(timer);
      try {
        const c = document.createElement('canvas');
        c.width  = img.naturalWidth  || 1200;
        c.height = img.naturalHeight || 800;
        c.getContext('2d').drawImage(img, 0, 0);
        resolve(c.toDataURL('image/jpeg', 0.82));
      } catch(e) { resolve(null); }
    };
    img.onerror = () => { clearTimeout(timer); resolve(null); };
    img.src = iUrlProxy(id);
  });
}

// ── PDF ───────────────────────────────────────────────────────────
async function buildPDF(){
  const btn = document.getElementById('dlBtn');
  btn.disabled = true;
  const pw = document.getElementById('progWrap');
  pw.classList.add('on');
  document.getElementById('warnBox').classList.remove('on');
  document.getElementById('infoBox').classList.remove('on');

  const setP = (pct, lbl) => {
    document.getElementById('progFill').style.width = pct+'%';
    document.getElementById('progLbl').textContent  = lbl;
  };

  try {
    const d    = DATA;
    const lang = getLang();
    const t    = T(d, lang);
    const note = document.getElementById('noteIn').value.trim();
    const showD= document.getElementById('showDist').checked;
    const max  = parseInt(document.getElementById('photoCnt').value);
    const ids  = d.imageIds.slice(0, max);

    const L = {
      de:{desc:'Beschreibung',amen:'Ausstattung',dist:'Entfernungen',persons:'Personen max.',beds:'Schlafzimmer',baths:'Badezimmer',area:'Fläche',loading:'Foto',building:'PDF aufbauen…',done:'✓ Fertig!'},
      en:{desc:'Description',amen:'Amenities',dist:'Distances',persons:'Persons',beds:'Bedrooms',baths:'Bathrooms',area:'Area',loading:'Photo',building:'Building PDF…',done:'✓ Done!'},
      fr:{desc:'Description',amen:'Équipements',dist:'Distances',persons:'Personnes',beds:'Chambres',baths:'Salles de bain',area:'Surface',loading:'Photo',building:'Création du PDF…',done:'✓ Terminé!'},
    }[lang];

    // Load images
    setP(2, lang==='en'?'Connecting to image proxy…':lang==='fr'?'Connexion au proxy d\'images…':'Verbinde mit Bild-Proxy…');
    await tick(200);

    const b64s = [];
    for(let i = 0; i < ids.length; i++){
      setP(2 + Math.round((i / ids.length) * 58), `${L.loading} ${i+1} / ${ids.length}…`);
      b64s.push(await loadViaProxy(ids[i]));
      await tick(10);
    }

    const valid = b64s.map((b,i) => ({b,i})).filter(x => x.b);
    const failed = ids.length - valid.length;

    setP(62, `${valid.length} ${lang==='en'?'images loaded':'lang'==='fr'?'images chargées':'Bilder geladen'} — ${L.building}`);
    await tick(100);

    if(valid.length === 0){
      throw new Error(lang==='en'?'No images could be loaded. Please check your internet connection.':lang==='fr'?'Aucune image n\'a pu être chargée.':'Kein Bild konnte geladen werden. Bitte Internetverbindung prüfen.');
    }

    // Build PDF
    const doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210, H=297, M=18, CW=W-M*2;

    // Cover
    doc.addImage(valid[0].b,'JPEG',0,0,W,118,undefined,'FAST');
    doc.setFillColor(8,6,3); doc.setGState(doc.GState({opacity:.40}));
    doc.rect(0,74,W,44,'F'); doc.setGState(doc.GState({opacity:1}));

    doc.setTextColor(255,255,255); doc.setFont('times','normal'); doc.setFontSize(26);
    doc.text(d.name, M, 106);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(215,200,180);
    doc.text(t.location, M, 114);

    let y=132; pL(doc,M,y-3,W-M);

    [[L.persons,d.specs.persons],[L.beds,d.specs.bedrooms],[L.baths,d.specs.bathrooms],[L.area,d.specs.size]]
    .forEach(([k,v],i)=>{
      const cx=M+i*(CW/4)+CW/8;
      doc.setTextColor(44,36,22); doc.setFont('times','normal'); doc.setFontSize(19);
      doc.text(String(v),cx,y+6,{align:'center'});
      doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(155,144,130);
      doc.text(k.toUpperCase(),cx,y+13,{align:'center'});
    });
    pL(doc,M,y+17,W-M); y+=27;

    // Short desc — use standard quotes for EN/FR
    doc.setFont('times','italic'); doc.setFontSize(11); doc.setTextColor(80,65,45);
    const quote = lang==='de' ? `„${t.shortDesc}"` : `"${t.shortDesc}"`;
    const sdL=doc.splitTextToSize(quote, CW);
    doc.text(sdL,M,y); y+=sdL.length*6.2+10;

    if(showD && t.distances){
      pSH(doc,L.dist,M,y,CW); y+=10;
      Object.entries(t.distances).forEach(([k,v],i)=>{
        const col=i%3,row=Math.floor(i/3),dx=M+col*(CW/3),dy=y+row*7;
        doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(44,36,22);
        doc.text(k+': ',dx,dy);
        doc.setFont('helvetica','normal'); doc.setTextColor(80,65,45);
        doc.text(String(v),dx+doc.getTextWidth(k+': '),dy);
      });
      y+=Math.ceil(Object.keys(t.distances).length/3)*7+10;
    }

    if(note){
      doc.setFillColor(248,244,238); doc.rect(M,y,CW,10,'F');
      doc.setFont('helvetica','italic'); doc.setFontSize(8.5); doc.setTextColor(120,100,70);
      doc.text(note,M+4,y+7.5); y+=16;
    }

    setP(68, L.building);

    // Description page
    doc.addPage(); y=M+8;
    pSH(doc,L.desc,M,y,CW); y+=11;
    doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(60,50,36);
    const dL=doc.splitTextToSize(t.description,CW);
    const lpp=Math.floor((H-y-M)/5.4);
    let li=0,lb=[];
    while(li<dL.length){
      lb=dL.slice(li,li+lpp); doc.text(lb,M,y); li+=lpp;
      if(li<dL.length){doc.addPage();y=M+8;}else{y+=lb.length*5.4+14;}
    }

    if(y>H-70){doc.addPage();y=M+8;}
    pSH(doc,L.amen,M,y,CW); y+=11;
    t.amenities.forEach((a,i)=>{
      const col=i%3,row=Math.floor(i/3);
      if(row>0&&col===0&&y+row*6.5>H-M){doc.addPage();y=M+8;}
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(80,68,50);
      doc.text('— '+a,M+col*(CW/3),y+row*6.5);
    });

    setP(76, lang==='en'?'Inserting photos…':lang==='fr'?'Insertion des photos…':'Fotos einfügen…');

    // Photo pages — 2 per page
    for(let pi=0;pi<valid.length;pi+=2){
      doc.addPage();
      const pH=(H-M*2-4)/2;
      valid.slice(pi,pi+2).forEach(({b},bi)=>{
        doc.addImage(b,'JPEG',M,M+bi*(pH+4),CW,pH,undefined,'FAST');
      });
      setP(76+Math.round((pi/valid.length)*20),`${L.loading}s ${Math.min(pi+2,valid.length)}/${valid.length}`);
      await tick(10);
    }

    setP(98, lang==='en'?'Finalising…':lang==='fr'?'Finalisation…':'Finalisieren…');

    // Footer
    const tot=doc.internal.getNumberOfPages();
    for(let p=1;p<=tot;p++){
      doc.setPage(p); pL(doc,M,H-12,W-M);
      doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(180,170,155);
      doc.text(d.name+' · '+t.location,M,H-6);
      doc.text(p+' / '+tot,W-M,H-6,{align:'right'});
    }

    setP(100, L.done);
    doc.save(d.name.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'')+'_Expose.pdf');

    if(failed > 0){
      const warnMsg = lang==='en'
        ? `${failed} images could not be loaded — ${valid.length} images included in PDF.`
        : lang==='fr'
        ? `${failed} images n'ont pas pu être chargées — ${valid.length} images dans le PDF.`
        : `${failed} Bilder konnten nicht geladen werden — ${valid.length} Bilder im PDF enthalten.`;
      showMsg('warn', warnMsg);
    }

  } catch(e){
    showMsg('warn','Error: '+e.message);
  } finally {
    setTimeout(()=>{pw.classList.remove('on');btn.disabled=false;},2500);
  }
}

// ── Helpers ───────────────────────────────────────────────────────
function pL(doc,x1,y,x2){
  doc.setDrawColor(200,168,130); doc.setLineWidth(.35); doc.line(x1,y,x2,y);
}
function pSH(doc,label,x,y,w){
  pL(doc,x,y+3,x+16);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(155,144,130);
  doc.text(label.toUpperCase(),x+20,y+5);
  pL(doc,x+20+doc.getTextWidth(label.toUpperCase())+4,y+3,x+w);
}
function showMsg(type, msg){
  const b = document.getElementById(type==='warn'?'warnBox':'infoBox');
  b.textContent = msg; b.classList.add('on');
}
function tick(ms=100){ return new Promise(r=>setTimeout(r,ms)); }
</script>
